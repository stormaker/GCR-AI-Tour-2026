name: tech-insight-workflow

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Lab-01-Tech-Insights/frontend/report.md'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  run-azure-ai:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Lab-01-Tech-Insights
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_AI_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_PROJECT_ENDPOINT || secrets.AZURE_AI_PROJECT_ENDPOINT }}
      AZURE_AI_MODEL_DEPLOYMENT_NAME: ${{ vars.AZURE_AI_MODEL_DEPLOYMENT_NAME || secrets.AZURE_AI_MODEL_DEPLOYMENT_NAME || 'gpt-5-mini' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}
      SWA_NAME: ${{ vars.SWA_NAME || secrets.SWA_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: Lab-01-Tech-Insights/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --pre -r requirements.txt
          python -m pip show agent-framework agent-framework-azure-ai azure-ai-agents azure-ai-projects

      - name: Preflight (required GitHub Variables/Secrets)
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [[ -z "${AZURE_CLIENT_ID}" ]]; then
            echo "Missing AZURE_CLIENT_ID (set as GitHub Actions Variable or Secret)." >&2
            missing=1
          fi
          if [[ -z "${AZURE_TENANT_ID}" ]]; then
            echo "Missing AZURE_TENANT_ID (set as GitHub Actions Variable or Secret)." >&2
            missing=1
          fi
          if [[ -z "${AZURE_SUBSCRIPTION_ID}" ]]; then
            echo "Missing AZURE_SUBSCRIPTION_ID (set as GitHub Actions Variable or Secret)." >&2
            missing=1
          fi
          if [[ -z "${AZURE_AI_PROJECT_ENDPOINT}" ]]; then
            echo "Missing AZURE_AI_PROJECT_ENDPOINT (set as GitHub Actions Variable or Secret)." >&2
            missing=1
          fi

          # Static Web Apps deployment config is OPTIONAL for this workflow.
          # If missing, we still generate + commit the latest frontend/report.md, but skip SWA deploy.
          if [[ -z "${AZURE_RESOURCE_GROUP}" || -z "${SWA_NAME}" ]]; then
            echo "Static Web Apps deploy is disabled (missing AZURE_RESOURCE_GROUP and/or SWA_NAME)." >&2
            echo "- To enable: set AZURE_RESOURCE_GROUP + SWA_NAME, or run workflow: deploy-frontend-swa" >&2
          fi

          if [[ "${missing}" != "0" ]]; then
            echo >&2
            echo "How to fix (recommended):" >&2
            echo "- Run Lab-01-Tech-Insights/scripts/setup_github_actions_oidc.sh --configure-github (or .ps1) to auto-create OIDC + set Variables" >&2
            echo "- Or set repo Variables in: Settings → Secrets and variables → Actions → Variables" >&2
            exit 1
          fi

      - name: Debug OIDC inputs (non-secret)
        shell: bash
        run: |
          set -euo pipefail
          echo "AZURE_CLIENT_ID=${AZURE_CLIENT_ID}"
          echo "Expected subject: repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Create/reuse Foundry agents and write id map
        run: |
          python generated/tech_insight_workflow/create_agents_from_workflow.py \
            --workflow workflows/tech_insight_workflow.yaml \
            --spec generated/tech_insight_workflow/agents.yaml \
            --write-id-map generated/tech_insight_workflow/agent_id_map.json

      - name: Run workflow (Azure AI)
        env:
          RUN_OUT: output/ci-azure-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cd generated/tech_insight_workflow
          python run.py --non-interactive --azure-ai --azure-ai-verbose --set Local.RunOutputDir=${RUN_OUT}
          echo "Wrote outputs to ${RUN_OUT}"

      - name: Report fallback modes
        shell: bash
        env:
          RUN_OUT: output/ci-azure-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          run_out = os.environ.get("RUN_OUT")
          summary = os.environ.get("GITHUB_STEP_SUMMARY")

          def read_json(path):
            try:
              with open(path, "r", encoding="utf-8") as f:
                return json.load(f)
            except Exception as exc:
              return {"_error": str(exc)}

          clusters = read_json(os.path.join(run_out, "clusters", "hotspots.json"))
          insights = read_json(os.path.join(run_out, "insights", "insights.json"))

          clusters_mode = clusters.get("mode")
          insights_mode = insights.get("mode")

          print(f"clusters.mode={clusters_mode}")
          print(f"insights.mode={insights_mode}")

          if summary:
            with open(summary, "a", encoding="utf-8") as f:
              f.write("\n## Fallback Modes\n\n")
              f.write(f"- clusters.mode: {clusters_mode}\n")
              f.write(f"- insights.mode: {insights_mode}\n")
          PY

      - name: Update frontend/report.md
        shell: bash
        env:
          RUN_OUT: output/ci-azure-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          src="${RUN_OUT}/report.md"
          if [[ ! -f "$src" ]]; then
            echo "Missing report: $src" >&2
            exit 1
          fi
          stamp="<!-- updated: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT} @ ${GITHUB_RUN_NUMBER} -->"
          {
            echo "$stamp";
            echo;
            cat "$src";
          } > frontend/report.md

      - name: Get SWA deployment token
        id: swa_token
        if: ${{ env.SWA_NAME != '' && env.AZURE_RESOURCE_GROUP != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! az staticwebapp show --name "${SWA_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" >/dev/null 2>&1; then
            echo "Static Web App not found: ${SWA_NAME} (rg=${AZURE_RESOURCE_GROUP})." >&2
            echo "Run workflow 'deploy-frontend-swa' to create it, or fix SWA_NAME/AZURE_RESOURCE_GROUP." >&2
            exit 1
          fi

          token=""
          for _ in $(seq 1 30); do
            token=$(az staticwebapp secrets list --name "${SWA_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.apiKey -o tsv 2>/dev/null || true)
            if [[ -n "$token" && "$token" != "null" ]]; then
              break
            fi
            sleep 4
          done
          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "Failed to retrieve SWA deployment token." >&2
            exit 1
          fi

          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        if: ${{ env.SWA_NAME != '' && env.AZURE_RESOURCE_GROUP != '' }}
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "Lab-01-Tech-Insights/frontend"
          output_location: ""
          api_location: ""
          skip_app_build: true

      - name: Commit and push frontend update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add frontend/report.md
          if git diff --cached --quiet; then
            echo "No frontend changes to commit."
            exit 0
          fi
          git commit -m "chore: update frontend report"
          git push

      - name: Upload outputs (Azure)
        uses: actions/upload-artifact@v4
        with:
          name: tech-insight-output-azure
          path: |
            Lab-01-Tech-Insights/output/ci-azure-${{ github.run_id }}-${{ github.run_attempt }}/
            Lab-01-Tech-Insights/output/ci-azure-${{ github.run_id }}-${{ github.run_attempt }}/report.md
          if-no-files-found: error

